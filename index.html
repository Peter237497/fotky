<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Stavby Foto</title>
<meta name="theme-color" content="#0B120F">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stavby Foto">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app" id="app">

  <!-- ============ HLAVNÍ OBRAZOVKA ============ -->
  <section class="screen" id="screen-main">

    <header class="titleblock">
      <div class="titleblock-row">
        <span class="tb-label">OBJEKT</span>
        <div class="stavba-pill">
          <select id="stavbaSelect" class="tb-select"></select>
          <button class="tb-edit-btn" id="btnEditStavba" aria-label="Přejmenovat objekt">
            <i class="ti ti-pencil" aria-hidden="true"></i>
          </button>
        </div>
      </div>
      <div class="titleblock-row titleblock-row--split">
        <div>
          <span class="tb-label">DATUM</span>
          <span class="tb-value" id="tbDate">—</span>
        </div>
        <div>
          <span class="tb-label">SNÍMKŮ</span>
          <span class="tb-value" id="tbCount">0</span>
        </div>
      </div>
    </header>

    <button class="new-stavba-btn" id="btnNewStavba">+ Nový objekt</button>

    <div class="controls-row">
      <button class="gallery-btn" id="btnGallery" aria-label="Galerie">
        <i class="ti ti-photo" aria-hidden="true"></i>
        <span>Galerie</span>
      </button>
      <button class="shutter" id="btnShoot" aria-label="Vyfotit"></button>
      <button class="gallery-btn" id="btnPD" aria-label="Přepnout ukládání do podsložky PD">
        <i class="ti ti-folder" aria-hidden="true"></i>
        <span>PD</span>
      </button>
    </div>
    <p class="shutter-hint" id="shutterHint">Vyber objekt a foť</p>

    <input type="file" id="cameraInput" accept="image/*" capture="environment" hidden>

    <div class="thumbs" id="thumbs"></div>

  </section>

  <!-- ============ GALERIE ============ -->
  <section class="screen screen--hidden" id="screen-gallery">
    <div class="gal-header">
      <button class="gal-back" id="btnGalBack" aria-label="Zpět"><i class="ti ti-arrow-left" aria-hidden="true"></i></button>
      <h1 id="galTitle">Galerie</h1>
      <span style="width:20px;"></span>
    </div>
    <div class="gal-grid" id="galGrid"></div>
  </section>

  <!-- ============ PŘEHLED / NAHRÁVÁNÍ ============ -->
  <section class="screen screen--hidden" id="screen-overview">
    <header class="ov-header">
      <h1>Přehled objektů</h1>
      <p class="ov-sub">Zálohuj fotky do Souborů, jakmile máš čas.</p>
    </header>

    <p class="backup-note">Lokální záloha: <b id="backupCount">0 fotek</b> uloženo přímo v telefonu — funguje i bez signálu.</p>

    <button class="new-stavba-btn" id="btnNewStavbaOverview">+ Přidat objekt</button>

    <div class="ov-list" id="ovList"></div>

    <button class="upload-btn" id="btnExportZip">
      <i class="ti ti-file-zip" aria-hidden="true" style="margin-right:6px;"></i>Zálohovat vše do Souborů (ZIP)
    </button>
    <div class="upload-status" id="uploadStatus"></div>

    <button class="danger-btn" id="btnResetAll">
      <i class="ti ti-trash" aria-hidden="true" style="margin-right:6px;"></i>Smazat všechny objekty a fotky
    </button>
  </section>

  <!-- ============ SPODNÍ NAVIGACE ============ -->
  <nav class="tabbar">
    <button class="tab tab--active" data-screen="main">
      <span class="tab-ico"><i class="ti ti-camera" aria-hidden="true"></i></span><span>Foto</span>
    </button>
    <button class="tab" data-screen="overview">
      <span class="tab-ico"><i class="ti ti-list" aria-hidden="true"></i></span><span>Přehled</span>
    </button>
  </nav>

</div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose" aria-label="Zpět"><i class="ti ti-arrow-left" aria-hidden="true"></i></button>
  <img id="lightboxImg" src="" alt="">
  <div class="lightbox-bar">
    <button id="lightboxDelete"><i class="ti ti-trash" aria-hidden="true"></i>Smazat</button>
  </div>
</div>

<div class="watermark">by PL</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<script src="app.js"></script>
</body>
</html>
